name: 'Gradle Test'
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  build:
    name: 'Gradle Test'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6'
      - name: 'Set up JDK 21 for x64'
        uses: 'actions/setup-java@v5'
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: 'x64'
      - name: 'Setup Gradle'
        uses: 'gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60'
      - name: 'Build with Gradle'
        run: './gradlew compileKotlin compileTestKotlin'
      - name: 'Test with Gradle'
        run: './gradlew test'
